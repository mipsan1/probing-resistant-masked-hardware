name: Probe analyzer (PyPROBE) — in-house 1st/2nd-order robust d-probing

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe-analyzer:
    name: PyPROBE robust d-probing verification
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates git \
            python3 python3-dev python3-pip
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install Python dependencies (NumPy, SciPy, pycryptodome)
        run: |
          pip3 install --break-system-packages --no-cache-dir \
            numpy scipy pycryptodome matplotlib

      - name: Sanity check input files
        run: |
          test -f sim/power_gl_header.txt || (echo "missing header" && exit 1)
          test -f sim/power_gl_trace.txt  || (echo "missing trace"  && exit 1)
          test -f sim/power_gl_secret.txt || (echo "missing secret" && exit 1)
          echo "input files OK"

      - name: Run 1st-order probe analyzer
        run: |
          python3 probe/probe_analyzer.py \
            --trace  sim/power_gl_trace.txt \
            --header sim/power_gl_header.txt \
            --secret sim/power_gl_secret.txt \
            --out-md  probe/results/pyprobe_1st_order.md \
            --out-csv probe/results/pyprobe_1st_order.csv \
            --n-bits 27 --n-shares 2
          echo "===== 1st-order summary ====="
          head -40 probe/results/pyprobe_1st_order.md

      - name: Run 2nd-order probe analyzer
        run: |
          python3 probe/probe_analyzer.py \
            --trace  sim/power_gl_d2_trace.txt \
            --header sim/power_gl_d2_header.txt \
            --secret sim/power_gl_secret.txt \
            --out-md  probe/results/pyprobe_2nd_order.md \
            --out-csv probe/results/pyprobe_2nd_order.csv \
            --n-bits 27 --n-shares 4
          echo "===== 2nd-order summary ====="
          head -40 probe/results/pyprobe_2nd_order.md

      - name: Upload probe report
        uses: actions/upload-artifact@v4
        with:
          name: pyprobe-report
          path: |
            probe/results/pyprobe_1st_order.md
            probe/results/pyprobe_1st_order.csv
            probe/results/pyprobe_2nd_order.md
            probe/results/pyprobe_2nd_order.csv
          if-no-files-found: error
          retention-days: 90
