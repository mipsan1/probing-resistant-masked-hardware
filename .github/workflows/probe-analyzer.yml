name: Probe analyzer (PyPROBE) — in-house 1st/2nd-order robust d-probing

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  probe-analyzer:
    name: PyPROBE robust d-probing verification
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system + Python dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential git python3 python3-dev python3-pip
          sudo rm -rf /var/lib/apt/lists/*
          pip3 install --break-system-packages --no-cache-dir numpy scipy pycryptodome

      - name: Sanity check input files (verbose)
        run: |
          for f in sim/power_gl_header.txt sim/power_gl_trace.txt \
                   sim/power_gl_d2_header.txt sim/power_gl_d2_trace.txt; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f")
              echo "  ✅ $f ($size bytes)"
            else
              echo "  ❌ missing $f"
              exit 1
            fi
          done
          # show first few lines of trace to verify format
          echo ""
          echo "=== first 3 lines of sim/power_gl_trace.txt ==="
          head -3 sim/power_gl_trace.txt | cut -c1-100
          echo ""
          echo "=== first 3 lines of sim/power_gl_header.txt ==="
          head -3 sim/power_gl_header.txt

      - name: Run 1st-order probe analyzer
        run: |
          mkdir -p probe/results
          set -x
          python3 probe/probe_analyzer.py \
            sim/power_gl_trace.txt \
            sim/power_gl_header.txt \
            probe/results/pyprobe_1st_order \
            2 2>&1 | tee probe/results/pyprobe_1st_order.log
          set +x
          echo "===== 1st-order summary ====="
          head -50 probe/results/pyprobe_1st_order/probing_report.md

      - name: Run 2nd-order probe analyzer
        run: |
          set -x
          python3 probe/probe_analyzer.py \
            sim/power_gl_d2_trace.txt \
            sim/power_gl_d2_header.txt \
            probe/results/pyprobe_2nd_order \
            4 2>&1 | tee probe/results/pyprobe_2nd_order.log
          set +x
          echo "===== 2nd-order summary ====="
          head -50 probe/results/pyprobe_2nd_order/probing_report.md

      - name: Sanity gate — expect PASS in both reports
        run: |
          fail=0
          for d in 1st_order 2nd_order; do
            if ! grep -q "PASS" probe/results/pyprobe_${d}/probing_report.md; then
              echo "❌ ${d}: missing PASS"
              fail=1
            fi
            if grep -q "FAIL" probe/results/pyprobe_${d}/probing_report.md; then
              echo "❌ ${d}: contains FAIL"
              fail=1
            fi
          done
          [ $fail -eq 0 ] && echo "✅ both PyPROBE reports pass" || exit 1

      - name: Upload probe report
        uses: actions/upload-artifact@v4
        with:
          name: pyprobe-report
          path: probe/results/pyprobe_*/
          if-no-files-found: error
          retention-days: 90
