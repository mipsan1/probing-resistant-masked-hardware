name: TVLA (Welch's t-test) — gate-level leakage assessment

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tvla:
    name: TVLA gate-level t-test (1st / 2nd order)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates git \
            python3 python3-dev python3-pip
          sudo rm -rf /var/lib/apt/lists/*
          pip3 install --break-system-packages --no-cache-dir numpy scipy pycryptodome

      - name: Sanity check TVLA inputs
        run: |
          for f in sim/power_gl_header.txt sim/power_gl_trace.txt \
                   sim/power_gl_d2_header.txt sim/power_gl_d2_trace.txt; do
            test -f "$f" || (echo "missing $f" && exit 1)
          done
          echo "TVLA inputs OK"

      - name: Run TVLA 1st order
        run: |
          mkdir -p probe/results
          python3 probe/tvla.py \
            sim/power_gl_trace.txt \
            sim/power_gl_header.txt \
            probe/results/tvla_1st_order \
            1
          echo "===== TVLA 1st-order summary ====="
          head -50 probe/results/tvla_1st_order/tvla_report.md

      - name: Run TVLA 2nd order
        run: |
          python3 probe/tvla.py \
            sim/power_gl_d2_trace.txt \
            sim/power_gl_d2_header.txt \
            probe/results/tvla_2nd_order \
            2
          echo "===== TVLA 2nd-order summary ====="
          head -50 probe/results/tvla_2nd_order/tvla_report.md

      - name: Sanity gate — expect PASS in both reports
        run: |
          fail=0
          for d in 1st_order 2nd_order; do
            if ! grep -q "PASS" probe/results/tvla_${d}/tvla_report.md; then
              echo "❌ ${d}: missing PASS"
              fail=1
            fi
            if grep -q "Overall verdict: FAIL" probe/results/tvla_${d}/tvla_report.md; then
              echo "❌ ${d}: overall FAIL"
              fail=1
            fi
          done
          [ $fail -eq 0 ] && echo "✅ both TVLA reports pass |t|<4.5" || exit 1

      - name: Upload TVLA report
        uses: actions/upload-artifact@v4
        with:
          name: tvla-report
          path: probe/results/tvla_*/
          if-no-files-found: error
          retention-days: 90
