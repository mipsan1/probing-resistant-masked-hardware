name: TVLA (Welch's t-test) — gate-level leakage assessment

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tvla:
    name: TVLA gate-level t-test (1st / 2nd order)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates git \
            python3 python3-dev python3-pip
          sudo rm -rf /var/lib/apt/lists/*
          pip3 install --break-system-packages --no-cache-dir \
            numpy scipy pycryptodome matplotlib

      - name: Sanity check TVLA inputs
        run: |
          test -d sim/tvla_gl     || (echo "missing sim/tvla_gl"     && exit 1)
          test -d sim/tvla_gl_d2  || (echo "missing sim/tvla_gl_d2"  && exit 1)
          echo "TVLA inputs OK"

      - name: Run TVLA 1st order
        run: |
          python3 probe/tvla.py \
            --fixed  sim/tvla_gl/fixed.txt \
            --random sim/tvla_gl/random.txt \
            --out-md  probe/results/tvla_1st_order.md \
            --threshold 4.5
          echo "===== TVLA 1st-order summary ====="
          head -40 probe/results/tvla_1st_order.md

      - name: Run TVLA 2nd order (centered product)
        run: |
          python3 probe/tvla.py \
            --fixed  sim/tvla_gl_d2/fixed.txt \
            --random sim/tvla_gl_d2/random.txt \
            --out-md  probe/results/tvla_2nd_order.md \
            --threshold 4.5 --centered-product
          echo "===== TVLA 2nd-order summary ====="
          head -40 probe/results/tvla_2nd_order.md

      - name: Upload TVLA report
        uses: actions/upload-artifact@v4
        with:
          name: tvla-report
          path: |
            probe/results/tvla_1st_order.md
            probe/results/tvla_2nd_order.md
          if-no-files-found: warn
          retention-days: 90
