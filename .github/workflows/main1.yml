name: PROLEAD robust d-probing cross-check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prolead:
    name: PROLEAD verification (99840 sims)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential ca-certificates cmake git \
              libboost-all-dev libclipper-dev libflint-dev \
                        libgmp-dev libmpfr-dev libomp-dev \
              libssl-dev libqhull-dev pkg-config \
              python3 python3-dev python3-pip yosys
          sudo rm -rf /var/lib/apt/lists/*
      - name: Install pycryptodome
        run: pip3 install --break-system-packages --no-cache-dir pycryptodome
        
        - name: Install gdstk
          run: pip3 install --break-system-packages --no-cache-dir gdstk

      - name: Clone PROLEAD
        run: git clone --depth 1 --branch v3.1.0 https://github.com/Chair-for-Security-Engineering/PROLEAD.git PROLEAD

      - name: Build PROLEAD
        run: cd PROLEAD && make release -j"$(nproc)"

      - name: Synthesise circuit
        run: yosys -q syn/synth_circuit.ys

      - name: Remap cells
        run: python3 syn/remap_prolead_cells.py syn/prolead/circuit.v syn/prolead/circuit.v

      - name: Run PROLEAD
        run: |
          mkdir -p sim/prolead
          ./PROLEAD/release/PROLEAD \
              --designFile syn/prolead/circuit.v \
              --configFile syn/prolead/config.json \
              --outputDirectory sim/prolead \
              --libraryFile syn/prolead/library_yosys.json \
              --libraryName yosys_primitives

      - name: Convert report
        run: python3 syn/prolead_report_to_md.py sim/prolead/server_config.json sim/prolead/server_report.txt sim/prolead/prolead_summary.md

      - name: Sanity check
        run: |
          python3 -c "
          import pathlib, sys
          report = pathlib.Path('sim/prolead/server_report.txt').read_text()
          fails = [l for l in report.splitlines() if ('leakage' in l.lower() and 'detect' in l.lower()) or 'verdict: insecure' in l.lower()]
          if fails:
              print('PROLEAD REPORTED LEAKAGE:')
              for l in fails: print(' ', l)
              sys.exit(1)
          print('PROLEAD: no leakage detected for d=1.')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: prolead-report
          path: |
            sim/prolead/server_config.json
            sim/prolead/server_report.txt
            sim/prolead/prolead_summary.md
          if-no-files-found: error
          retention-days: 90
