# =====================================================================
# ci-smoke.yml (DISABLED — iverilog compatibility)
# =====================================================================
# This workflow is disabled because `iverilog -g2012 -t null` (parse-
# only mode) cannot parse some of the SystemVerilog 2009/2012 syntax
# used in rtl/*.v. Icarus Verilog's stable iverilog-11 supports
# Verilog-2005 but limited SystemVerilog.
#
# To re-enable, either:
# 1. Install Verilator (which has better SV support) and use
#    `verilator --lint-only -Wall` for the syntax check
# 2. Downgrade the SystemVerilog features in rtl/*.v to Verilog-2005
#
# Until that, the workflow is set to `if: false`.
# =====================================================================
name: CI smoke test — DISABLED (iverilog compatibility)

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    if: false                 # ← disabled
    name: Quick Verilog syntax + hygiene [DISABLED]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: (disabled — see file header for re-enable instructions)
        run: echo "This workflow is disabled. Edit .github/workflows/ci-smoke.yml and remove 'if: false' to re-enable."
