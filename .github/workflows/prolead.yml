# =====================================================================
# prolead.yml (DISABLED — CI build environment)
# =====================================================================
# This workflow is disabled because the PROLEAD C++ toolchain
# (https://github.com/ChairImpSec/PROLEAD) requires a heavy
# dependency chain (Boost + libflint + libgdstk + libclipper +
# libgmp + libmpfr + OpenMP) and ~5-10 minutes to build from
# source on GitHub's free ubuntu-latest runners. Across v3, v4,
# and v5 attempts, the "Build PROLEAD" step consistently failed
# due to library version/path mismatches.
#
# PROLEAD-based verification of the IEEE TIFS submission is
# performed on the author's local workstation (Linux x86-64, Boost
# 1.74, libflint 2.9, gdstk 0.9.60) and the resulting
# sim/prolead/prolead_summary.md is committed alongside the
# code. This CI workflow is preserved for future re-enablement
# when a self-hosted runner with pre-installed dependencies
# becomes available.
#
# Until then, this workflow is set to `if: false`.
# =====================================================================
name: PROLEAD robust d-probing cross-check — DISABLED (CI build env)

on:
  workflow_dispatch:
    inputs:
      number_of_simulations:
        description: "Number of Monte-Carlo simulations per probe set (smoke = 10000)"
        required: false
        default: "10000"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prolead:
    if: false                 # ← disabled
    name: PROLEAD verification [DISABLED]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: (disabled — see file header for re-enable instructions)
        run: echo "This workflow is disabled. Edit .github/workflows/prolead.yml and remove 'if: false' to re-enable."
