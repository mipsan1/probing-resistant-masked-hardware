# =====================================================================
# .github/workflows/prolead.yml
# =====================================================================
# Cross-check our masked AES S-box against PROLEAD (Müller & Moradi,
# TCHES 2022) on a fresh Linux runner.  PROLEAD's C++ toolchain cannot
# be built on macOS hosts (Boost + libflint + libgmp + libmpfr + OpenMP
# dependency chain), so we run it here on `ubuntu-latest` to obtain an
# independent confirmation of the 1st-order robust probing claim that
# our in-house `probe/probe_analyzer.py` and gate-level VCD/TVLA
# pipeline already make.
#
# Inputs:
#   - number_of_simulations  (default 99840 = 1560*64, the largest
#     multiple of 64 below 100k that PROLEAD's schema accepts;
#     pass e.g. 10000 for a <2 min smoke test instead of ~5 min)
#
# Outputs:
#   - sim/prolead/prolead_summary.md, server_config.json, server_report.txt
#     uploaded as a `prolead-report` artifact on every run.
#
# Triggers:
#   - manual:  workflow_dispatch (any time, for reproduction)
#   - push:    every push to main (results pinned in CI history)
#   - PR:      opened or synchronized (reviewer evidence)
# =====================================================================
name: PROLEAD robust d-probing cross-check

on:
  workflow_dispatch:
    inputs:
      number_of_simulations:
        description: |
          Number of Monte-Carlo simulations per probe set.  PROLEAD's
          default of 100,000 takes ~5 min on the free Linux runner;
          use 10,000 for a <2 min smoke test.  Must be a multiple of 64
          (PROLEAD constraint); the workflow will round the value down
          to the nearest multiple if it is not.
        required: false
        default: "99840"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prolead:
    name: PROLEAD verification (${{ inputs.number_of_simulations || '100000' }} sims)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies (Boost, libflint, OpenMP, Yosys, Python3)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              build-essential \
              ca-certificates \
              cmake \
              git \
              libboost-all-dev \
              libclipper-dev \
              libflint-dev \
              libgdstk-dev \
              libgmp-dev \
              libmpfr-dev \
              libomp-dev \
              libssl-dev \
              libqhull-dev \
              pkg-config \
              python3 \
              python3-dev \
              python3-pip \
              yosys
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install pycryptodome
        run: pip3 install --break-system-packages --no-cache-dir pycryptodome

      - name: Clone PROLEAD
        run: |
          git clone --depth 1 --branch v3.1.0 https://github.com/Chair-for-Security-Engineering/PROLEAD.git PROLEAD
          ls PROLEAD

      - name: Build PROLEAD
        run: |
          cd PROLEAD
          make release -j"$(nproc)"
          ls -la release/PROLEAD

      - name: Synthesise circuit (Yosys)
        run: yosys -q syn/synth_circuit.ys

      - name: Remap $_SDFF_PN0_ -> $_DFF_P_
        run: python3 syn/remap_prolead_cells.py syn/prolead/circuit.v syn/prolead/circuit.v

      - name: Patch PROLEAD simulation count from workflow input
        if: ${{ inputs.number_of_simulations }}
        run: |
          python3 -c "
          import json, pathlib
          p = pathlib.Path('syn/prolead/config.json')
          c = json.loads(p.read_text())
          n_raw = int('${{ inputs.number_of_simulations }}')
          # PROLEAD requires `number_of_simulations` to be a
          # positive multiple of 64; round down to the nearest
          # valid value and warn the user.
          n = max(64, n_raw - (n_raw % 64))
          if n != n_raw:
              print('::warning::number_of_simulations rounded from', n_raw, 'to', n, '(must be a multiple of 64)')
          c['simulation']['number_of_simulations'] = n
          # PROLEAD's per-step batch (number_of_simulations_per_step)
          # must be a multiple of 64 and a divisor of
          # number_of_simulations; cap it at 10,000 so we never
          # run a single 100k-step batch that would saturate RAM.
          per_step = min(n, 10000)
          per_step -= per_step % 64
          c['simulation']['number_of_simulations_per_step'] = per_step
          p.write_text(json.dumps(c, indent=2) + '\n')
          print('patched number_of_simulations to', n)
          print('patched number_of_simulations_per_step to', per_step)
          "

      - name: Run PROLEAD
        run: |
          mkdir -p sim/prolead
          ./PROLEAD/release/PROLEAD \
              --designFile syn/prolead/circuit.v \
              --configFile syn/prolead/config.json \
              --outputDirectory sim/prolead \
              --libraryFile syn/prolead/library_yosys.json \
              --libraryName yosys_primitives

      - name: Convert PROLEAD report to Markdown
        run: |
          python3 syn/prolead_report_to_md.py \
              sim/prolead/server_config.json \
              sim/prolead/server_report.txt \
              sim/prolead/prolead_summary.md
          echo "===== prolead_summary.md ====="
          cat sim/prolead/prolead_summary.md

      - name: Sanity check (expect no leaked probe sets)
        run: |
          python3 -c "
          import json, pathlib, re, sys
          cfg = json.loads(pathlib.Path('sim/prolead/server_config.json').read_text())
          report = pathlib.Path('sim/prolead/server_report.txt').read_text()
          d = cfg['side_channel_analysis']['order']
          # PROLEAD's report format ends with a per-probe-set verdict
          # table.  A 'PASS' / 'no leakage' verdict is the success
          # condition.  We deliberately use a strict substring match
          # rather than `in` so that we don't false-positive on the
          # converter's PASS line.
          fails = []
          for ln in report.splitlines():
              ll = ln.lower()
              if ('leakage' in ll and 'detect' in ll) or 'verdict: insecure' in ll:
                  fails.append(ln.strip())
              if 'verdict: secure' in ll or 'no leakage' in ll:
                  print('verdict line:', ln.strip())
          if fails:
              print('PROLEAD REPORTED LEAKAGE (d=' + str(d) + '):')
              for l in fails:
                  print('  ', l)
              sys.exit(1)
          print('PROLEAD: no leakage detected for d=' + str(d) + ' robust probing.')
          "

      - name: Upload PROLEAD report
        uses: actions/upload-artifact@v4
        with:
          name: prolead-report
          path: |
            sim/prolead/server_config.json
            sim/prolead/server_report.txt
            sim/prolead/prolead_summary.md
            syn/prolead/circuit.v
          if-no-files-found: error
          retention-days: 90
