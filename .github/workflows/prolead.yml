# PROLEAD robust d-probing cross-check (smoke mode)
# ----------------------------------------------------------------------
# Note: This workflow runs in SMOKE mode by default (10,000 simulations,
# ~2 min) to keep CI under 10 min and within GitHub's free-tier limits.
# The full TIFS-quality verification (1,536,000 simulations, ~5-30 min)
# is run on the author's local workstation and the resulting report
# is committed to the repository. This CI smoke run only confirms
# the toolchain, library files, and config schema are all valid.
#
# To run the full verification locally, set PROLEAD_SIMS=1536000.
# ======================================================================
name: PROLEAD robust d-probing cross-check (CI smoke)

on:
  workflow_dispatch:
    inputs:
      number_of_simulations:
        description: "Number of Monte-Carlo simulations per probe set (smoke = 10000)"
        required: false
        default: "10000"
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  prolead:
    name: PROLEAD verification (${{ inputs.number_of_simulations || '10000' }} sims, smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout submission
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential ca-certificates cmake git \
            libboost-all-dev libomp-dev libssl-dev pkg-config \
            python3 python3-dev python3-pip yosys
          sudo rm -rf /var/lib/apt/lists/*

      - name: Install pycryptodome
        run: pip3 install --break-system-packages --no-cache-dir pycryptodome

      - name: Clone PROLEAD
        run: git clone --depth 1 --branch v3.1.0 https://github.com/ChairImpSec/PROLEAD.git PROLEAD

      - name: Build PROLEAD
        run: cd PROLEAD && make release -j"$(nproc)"

      - name: Synthesise circuit (Yosys)
        run: yosys -q syn/synth_circuit.ys

      - name: Remap $_SDFF_PN0_ -> $_DFF_P_
        run: python3 syn/remap_prolead_cells.py syn/prolead/circuit.v syn/prolead/circuit.v

      - name: Patch config to smoke-mode sim count
        run: |
          python3 -c "
          import json, pathlib, os
          n = int(os.environ.get('PROLEAD_SIMS', '10000'))
          p = pathlib.Path('syn/prolead/config.json')
          c = json.loads(p.read_text())
          c['simulation']['number_of_simulations'] = n
          c['simulation']['number_of_simulations_per_step'] = n
          p.write_text(json.dumps(c, indent=2) + '\n')
          print('PROLEAD_SIMS =', n)
          "
        env:
          PROLEAD_SIMS: ${{ inputs.number_of_simulations || '10000' }}

      - name: Run PROLEAD
        run: |
          mkdir -p sim/prolead
          ./PROLEAD/release/PROLEAD \
            --designFile syn/prolead/circuit.v \
            --configFile syn/prolead/config.json \
            --outputDirectory sim/prolead \
            --libraryFile syn/prolead/library_yosys.json \
            --libraryName custom

      - name: Convert PROLEAD report to Markdown
        run: |
          python3 syn/prolead_report_to_md.py \
            sim/prolead/server_config.json \
            sim/prolead/server_report.txt \
            sim/prolead/prolead_summary.md
          echo "===== prolead_summary.md ====="
          cat sim/prolead/prolead_summary.md

      - name: Sanity check
        run: |
          python3 -c "
          import json, pathlib, sys
          cfg = json.loads(pathlib.Path('sim/prolead/server_config.json').read_text())
          report = pathlib.Path('sim/prolead/server_report.txt').read_text()
          d = cfg['side_channel_analysis']['order']
          fails = [l.strip() for l in report.splitlines()
                   if ('leakage' in l.lower() and 'detect' in l.lower())
                   or 'verdict: insecure' in l.lower()]
          if fails:
              print('PROLEAD REPORTED LEAKAGE (d=' + str(d) + '):')
              for l in fails: print('  ', l)
              sys.exit(1)
          print('PROLEAD: no leakage detected for d=' + str(d) + ' (smoke mode).')
          "

      - name: Upload PROLEAD report
        uses: actions/upload-artifact@v4
        with:
          name: prolead-report
          path: |
            sim/prolead/server_config.json
            sim/prolead/server_report.txt
            sim/prolead/prolead_summary.md
          if-no-files-found: error
          retention-days: 90
